name: CI/CD - Build and Push

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    # Wichtig für OIDC → Managed Identity
    permissions:
      id-token: write
      contents: read

    env:
      FRONTEND_IMAGE: ${{ github.repository }}-frontend
      BACKEND_IMAGE: ${{ github.repository }}-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login via UAMI (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to registry
        uses: docker/login-action@v2
        with:
          registry: ${{ secrets.REGISTRY_HOST }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: Dockerfile.backend
          push: true
          tags: |
            ${{ secrets.REGISTRY_HOST }}/${{ env.BACKEND_IMAGE }}:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: |
            ${{ secrets.REGISTRY_HOST }}/${{ env.FRONTEND_IMAGE }}:latest

      - name: Image summary
        run: |
          echo "Frontend image: ${{ secrets.REGISTRY_HOST }}/${{ env.FRONTEND_IMAGE }}:latest"
          echo "Backend image: ${{ secrets.REGISTRY_HOST }}/${{ env.BACKEND_IMAGE }}:latest"
