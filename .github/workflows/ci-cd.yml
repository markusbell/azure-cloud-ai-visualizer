name: CI/CD - Build and Push Docker Images to ACR and Deploy to Azure

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  # UAMI / OIDC Secrets
  AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  # RG Name
  RESOURCE_GROUP_NAME: ${{ secrets.RESOURCE_GROUP_NAME }}

  # ACR Name (ohne .azurecr.io)
  ACR_NAME: ${{ secrets.ACR_NAME }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    env:
      FRONTEND_IMAGE: ${{ github.repository }}-frontend
      BACKEND_IMAGE: ${{ github.repository }}-backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1) Login bei Azure mittels UAMI + OIDC
      - name: Azure Login via UAMI (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      # 2) Login bei ACR mit Azure-Credentials (kein User/Pass)
      - name: Log in to ACR using Azure credentials
        run: |
          echo "Logging in to ACR: $ACR_NAME"
          az acr login --name $ACR_NAME
          echo "Docker config after login:"
          cat ~/.docker/config.json || echo "No docker config"

      # 3) Docker Buildx Setup
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # 4) Backend bauen und pushen
      - name: Build and push backend image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: Dockerfile.backend
          push: true
          tags: |
            ${{ env.ACR_NAME }}.azurecr.io/${{ env.BACKEND_IMAGE }}:latest

      # 5) Frontend bauen und pushen
      - name: Build and push frontend image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: |
            ${{ env.ACR_NAME }}.azurecr.io/${{ env.FRONTEND_IMAGE }}:latest

      # 6) Images kurz ausgeben (Debug)
      - name: Image summary
        run: |
          echo "Frontend image: $ACR_NAME.azurecr.io/${{ env.FRONTEND_IMAGE }}:latest"
          echo "Backend image:  $ACR_NAME.azurecr.io/${{ env.BACKEND_IMAGE }}:latest"

      # 7) Deploy-Script ausführen (läuft unter derselben UAMI)
      - name: Deploy to Azure via deploy_to_azure.ps1
        shell: pwsh
        run: |
          ./deploy/deploy_to_azure.ps1 `
            -SubscriptionId "$env:AZURE_SUBSCRIPTION_ID" `
            -ResourceGroupName "$env:RESOURCE_GROUP_NAME" `
            -Location "westeurope" `
            -FrontendImage "$env:ACR_NAME.azurecr.io/${{ env.FRONTEND_IMAGE }}:latest" `
            -BackendImage "$env:ACR_NAME.azurecr.io/${{ env.BACKEND_IMAGE }}:latest" `
            -AcrName "$env:ACR_NAME"